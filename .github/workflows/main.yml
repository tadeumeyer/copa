name: Figma Frame Export

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Export Figma frames
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
        run: python scripts/figma_export.py

      - name: Commit and push updated frames
        run: |
          git config user.name  "figma-export-bot"
          git config user.email "figma-export-bot@users.noreply.github.com"
          git add exports/ .figma-cache/
          if git diff --staged --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "chore: auto-export Figma frames [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
